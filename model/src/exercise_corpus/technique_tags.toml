# Editorial technique tags per exercise primitive (issues #17, #36).
#
# Retrieval (match.match_by_dimension) filters candidates by `dimensions`;
# an empty bucket raises NoPrimitiveForDimensionError (no off-dimension
# fallback). Dimensions are restricted to the canonical 6 (tags.DIMENSIONS).
#
# Source -> dimension rationale:
#   hanon (ex.1-20): finger mechanics            -> articulation, timing
#   bach (inventions): two-voice counterpoint    -> articulation, phrasing
#   czerny (Op.840): melodic velocity studies    -> timing, articulation
#   burgmuller (Op.100): Romantic character      -> phrasing, dynamics, interpretation
#   chopin (Op.28): pedaled Romantic preludes    -> pedaling, dynamics, phrasing
#   satie (Gymnopedies/Gnossiennes): static pedal-> pedaling, dynamics
#
# `key` is the notated key (used by slice C ADAPT transpose). For the Mutopia
# MIDI sources it is extracted from the file key signature; 3 zero-fifths
# pieces (Bach Inv.1/13, Chopin Prel.1) are set from canonical knowledge.
# `techniques` is free human-readable vocabulary.

[hanon_001]
dimensions = ["articulation", "timing"]
techniques = ["finger_independence", "evenness"]
key = "C"

