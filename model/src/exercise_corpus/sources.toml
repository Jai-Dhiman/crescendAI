# Exercise corpus source manifest.
# All sources are unambiguously public domain globally (composers pre-1928).
#
# Two acquisition shapes:
#  - hanon: a single MusicXML book, split on Repeat barlines (boundary=repeat).
#  - the rest: a DIRECTORY of per-piece .mid files acquired from the Mutopia
#    Project (boundary=per_file). Mutopia ships LilyPond + MIDI; we ingest the
#    MIDI directly (Aria embeds MIDI; there is no robust .ly -> MusicXML tool).
#
# Re-acquire the Mutopia MIDI with model/src/exercise_corpus/acquire.sh.
# musicxml_path below is the directory each source's .mid files live in,
# relative to model/.

[[sources]]
name = "hanon"
title = "The Virtuoso Pianist, premiere partie (Hanon)"
composer = "Charles-Louis Hanon"
opus = ""
license = "public_domain"
# Exercises 1-20 (premiere partie). Single MusicXML, repeat-barline split.
musicxml_path = "data/scores/exercise_primitives/raw/hanon_virtuoso_no1-20.mxl"

[[sources]]
name = "bach"
title = "Two-Part Inventions, BWV 772-786 (J.S. Bach)"
composer = "Johann Sebastian Bach"
opus = "BWV 772-786"
license = "public_domain"
# 15 inventions, per-piece MIDI from Mutopia (BachJS).
musicxml_path = "data/scores/exercise_primitives/raw/bach_inventions"

[[sources]]
name = "czerny"
title = "50 melodische Uebungsstuecke, Op.840 (Czerny)"
composer = "Carl Czerny"
opus = "840"
license = "public_domain"
# Nos.1-10 (all Mutopia carries of Op.840), per-piece MIDI (CzernyC).
musicxml_path = "data/scores/exercise_primitives/raw/czerny_op840"

[[sources]]
name = "burgmuller"
title = "25 Progressive Studies, Op.100 (Burgmuller)"
composer = "Johann Friedrich Burgmuller"
opus = "100"
license = "public_domain"
# Nos.1-18 (all Mutopia carries of Op.100), per-piece MIDI (BurgmullerJFF).
musicxml_path = "data/scores/exercise_primitives/raw/burgmuller_op100"

[[sources]]
name = "chopin"
title = "Preludes, Op.28 (Chopin)"
composer = "Frederic Chopin"
opus = "28"
license = "public_domain"
# All 24 preludes (No.4 Suffocation edition), per-piece MIDI (ChopinFF).
musicxml_path = "data/scores/exercise_primitives/raw/chopin_op28"

[[sources]]
name = "satie"
title = "Gymnopedies & Gnossiennes (Satie)"
composer = "Erik Satie"
opus = ""
license = "public_domain"
# 3 Gymnopedies + Gnossiennes 1-3 (6 pieces), per-piece MIDI (SatieE).
musicxml_path = "data/scores/exercise_primitives/raw/satie"

# =====================================================================
# #49 corpus expansion -- KernScores craigsapp humdrum repos (350 pieces).
#
# Provenance: each source below is a public-domain craigsapp GitHub repo of
# **kern scores; .krn -> .mid via the verovio python module. Re-acquire with
# model/src/exercise_corpus/acquire_kernscores.sh (clone + convert). All
# composers pre-1928 -> globally public domain.
#
# Cross-source dedup already applied: craigsapp `chopin-preludes` (Op.28) is
# EXCLUDED -- it duplicates the #17 `chopin` (Mutopia Op.28) source. No other
# craigsapp repo overlaps the #17 six.
#
# `dimensions` / `techniques` are COARSE SOURCE-LEVEL tags (the #49 design:
# "source/opus-level tags for the curated core"). Per-primitive technique_tags
# entries cannot be authored until after the Aria embed + catalog write (tags
# validate against catalog primitive_ids), so they are expanded in the post-embed
# catalog step. Until then the bulk is still embedding-similarity retrievable.

[[sources]]
name = "beethoven_sonatas"
title = "Piano Sonatas (Beethoven, complete movements)"
composer = "Ludwig van Beethoven"
opus = "various"
license = "public_domain"
# 103 sonata movements, per-piece MIDI (craigsapp beethoven-piano-sonatas).
musicxml_path = "data/scores/exercise_primitives/raw/beethoven_sonatas"
dimensions = ["dynamics", "phrasing", "articulation", "interpretation"]
techniques = ["sonata-form", "dramatic-contrast", "classical-articulation", "scalar-passagework"]

[[sources]]
name = "mozart_sonatas"
title = "Piano Sonatas (Mozart, complete movements)"
composer = "Wolfgang Amadeus Mozart"
opus = "various"
license = "public_domain"
# 69 sonata movements, per-piece MIDI (craigsapp mozart-piano-sonatas).
musicxml_path = "data/scores/exercise_primitives/raw/mozart_sonatas"
dimensions = ["articulation", "phrasing", "dynamics", "timing"]
techniques = ["alberti-bass", "classical-articulation", "ornamentation", "scalar-passagework"]

[[sources]]
name = "scarlatti_sonatas"
title = "Keyboard Sonatas (D. Scarlatti)"
composer = "Domenico Scarlatti"
opus = ""
license = "public_domain"
# 65 sonatas, per-piece MIDI (craigsapp scarlatti-keyboard-sonatas).
musicxml_path = "data/scores/exercise_primitives/raw/scarlatti_sonatas"
dimensions = ["articulation", "timing"]
techniques = ["hand-crossing", "repeated-notes", "ornamentation", "baroque-articulation"]

[[sources]]
name = "haydn_sonatas"
title = "Keyboard Sonatas (Haydn)"
composer = "Joseph Haydn"
opus = ""
license = "public_domain"
# 14 sonata movements, per-piece MIDI (craigsapp haydn-keyboard-sonatas; the
# repo carries 25 .krn but the prior verovio pass yielded 14 clean MIDIs).
musicxml_path = "data/scores/exercise_primitives/raw/haydn_sonatas"
dimensions = ["articulation", "phrasing", "dynamics", "timing"]
techniques = ["classical-articulation", "wit-rhetoric", "scalar-passagework"]

[[sources]]
name = "joplin_rags"
title = "Ragtime (Scott Joplin)"
composer = "Scott Joplin"
opus = ""
license = "public_domain"
# 47 rags, per-piece MIDI (craigsapp joplin).
musicxml_path = "data/scores/exercise_primitives/raw/joplin_rags"
dimensions = ["timing", "articulation"]
techniques = ["stride-bass", "syncopation", "steady-tempo"]

[[sources]]
name = "chopin_mazurkas"
title = "Mazurkas (Chopin)"
composer = "Frederic Chopin"
opus = "various"
license = "public_domain"
# 52 mazurkas, per-piece MIDI (craigsapp chopin-mazurkas). Distinct repertoire
# from the #17 `chopin` Op.28 preludes; id_prefix chopin_mazurka avoids collision.
musicxml_path = "data/scores/exercise_primitives/raw/chopin_mazurkas"
dimensions = ["timing", "phrasing", "dynamics", "pedaling", "interpretation"]
techniques = ["rubato", "mazurka-rhythm", "romantic-phrasing", "rubato-pedaling"]
