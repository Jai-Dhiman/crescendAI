name = "crescendai-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

# No [assets] section -- API-only, no static files

[[d1_databases]]
binding = "DB"
database_name = "crescendai-db"
database_id = "659755a8-4e9e-4581-a2bd-d34b6f912c3a"

[[routes]]
pattern = "api.crescend.ai"
custom_domain = true

[vars]
APPLE_WEB_SERVICES_ID = "ai.crescend.web"
ENVIRONMENT = "production"
GOOGLE_CLIENT_ID = "726399246264-lkq6jl4khal8gagn65j9t2a8bg52i7ie.apps.googleusercontent.com"
HF_INFERENCE_ENDPOINT = "https://mxcyiqltad84v9w1.us-east4.gcp.endpoints.huggingface.cloud"
HF_AMT_ENDPOINT = ""  # Set after deploying Aria-AMT HF endpoint
CF_ACCOUNT_ID = ""  # Set via `wrangler secret put` or CF dashboard
SHADOW_BENCHMARK_ENABLED = "false"
SHADOW_BENCHMARK_PCT = "10"

[ai]
binding = "AI"
remote = true

[[r2_buckets]]
binding = "CHUNKS"
bucket_name = "crescendai-bucket"

[[r2_buckets]]
binding = "SCORES"
bucket_name = "crescendai-bucket"

[durable_objects]
bindings = [{ name = "PRACTICE_SESSION", class_name = "PracticeSession" }]

[[migrations]]
tag = "v1"
new_classes = ["PracticeSession"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1.0
