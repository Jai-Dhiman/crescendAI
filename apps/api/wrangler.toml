name = "crescendai-api"
main = "src/index.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.crescend.ai"
custom_domain = true

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://crescend.ai"
APPLE_BUNDLE_ID = "ai.crescend.ios"
APPLE_WEB_SERVICES_ID = "ai.crescend.web"
GOOGLE_CLIENT_ID = "726399246264-lkq6jl4khal8gagn65j9t2a8bg52i7ie.apps.googleusercontent.com"
BETTER_AUTH_URL = "https://api.crescend.ai"
SENTRY_DSN = ""
AI_GATEWAY_TEACHER = ""
AI_GATEWAY_BACKGROUND = ""
MUQ_ENDPOINT = ""
AMT_ENDPOINT = ""

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "ddbbe5fd7b6f4c249fc30f2cd7cb96d8"

[[durable_objects.bindings]]
name = "SESSION_BRAIN"
class_name = "SessionBrain"

[[migrations]]
tag = "v1"
new_classes = ["SessionBrain"]

[[r2_buckets]]
binding = "CHUNKS"
bucket_name = "crescendai-bucket"

[[r2_buckets]]
binding = "SCORES"
bucket_name = "crescendai-bucket"
