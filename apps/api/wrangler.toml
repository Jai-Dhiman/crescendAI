name = "crescendai-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

# No [assets] section -- API-only, no static files

[[d1_databases]]
binding = "DB"
database_name = "crescendai-db"
database_id = "659755a8-4e9e-4581-a2bd-d34b6f912c3a"

[[routes]]
pattern = "api.crescend.ai"
custom_domain = true

[vars]
APPLE_WEB_SERVICES_ID = "ai.crescend.web"
ENVIRONMENT = "production"
HF_INFERENCE_ENDPOINT = "https://u1oxy7egvq7rnm8z.us-east-1.aws.endpoints.huggingface.cloud"

[[r2_buckets]]
binding = "CHUNKS"
bucket_name = "crescendai-chunks"

[durable_objects]
bindings = [
  { name = "PRACTICE_SESSION", class_name = "PracticeSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["PracticeSession"]
