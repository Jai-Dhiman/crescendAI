name = "crescendai-api"
main = "src/index.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.crescend.ai"
custom_domain = true

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://crescend.ai"
APPLE_BUNDLE_ID = "ai.crescend.ios"
APPLE_WEB_SERVICES_ID = "ai.crescend.web"
GOOGLE_CLIENT_ID = "726399246264-lkq6jl4khal8gagn65j9t2a8bg52i7ie.apps.googleusercontent.com"
BETTER_AUTH_URL = "https://api.crescend.ai"
SENTRY_DSN = "https://13e64989bc4d83f5299ee06e5c4c7bf2@o4511017227321344.ingest.us.sentry.io/4511180915933184"
MUQ_ENDPOINT = "https://mxcyiqltad84v9w1.us-east4.gcp.endpoints.huggingface.cloud"
AMT_ENDPOINT = ""
HARNESS_V6_ENABLED = "false"
HARNESS_V6_CHAT_ENABLED = "false"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "ddbbe5fd7b6f4c249fc30f2cd7cb96d8"
localConnectionString = "postgresql://jdhiman:postgres@localhost:5432/crescendai_dev"

[ai]
binding = "AI"
remote = true

[[durable_objects.bindings]]
name = "SESSION_BRAIN"
class_name = "SessionBrain"

# Migration v1 already applied in production (created PracticeSession for Rust DO).
# v2 deletes the old class and creates the new one.
[[migrations]]
tag = "v1"
new_classes = ["PracticeSession"]

[[migrations]]
tag = "v2"
new_classes = ["SessionBrain"]
deleted_classes = ["PracticeSession"]

[[r2_buckets]]
binding = "CHUNKS"
bucket_name = "crescendai-bucket"

[[r2_buckets]]
binding = "SCORES"
bucket_name = "crescendai-bucket"
remote = true
